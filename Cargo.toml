[package]
name = "config_collector"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.27"
egui = "0.27"
chrono = { version = "0.4", features = ["serde"] }
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
anyhow = "1.0"
url = "2.5"
reqwest = { version = "0.12", features =["blocking", "socks", "rustls-tls-native-roots"] }
