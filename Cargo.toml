[package]
name = "config-collector-windows"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.29", default-features = true }
egui = "0.29"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls", "socks", "gzip", "brotli", "deflate"] }
scraper = "0.20"
regex = "1.11"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
anyhow = "1"
url = "2"
serde_json = "1"
