[package]
name = "config-collector-windows"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <youremail@example.com>"]
description = "Telegram Config Collector Pro"

[dependencies]
# رابط کاربری گرافیکی
eframe = { version = "0.29", default-features = true }
egui = "0.29"

# شبکه و درخواست‌های HTTP
reqwest = { version = "0.12", default-features = true, features = ["blocking", "socks", "gzip", "brotli", "deflate", "charset"] }

# پردازش و استخراج الگوها
regex = "1.11"

# مدیریت زمان و تاریخ (با قابلیت سریالایز برای فایل هیستوری)
chrono = { version = "0.4", features = ["serde"] }

# مدیریت فرمت داده‌ها (JSON و TOML)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# مدیریت خطاها
anyhow = "1.0"

[profile.release]
# بهینه‌سازی‌های فوق‌العاده برای کاهش حجم و افزایش سرعت اجرا در ویندوز
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
