[package]
name = "config-collector-windows"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.29", default-features = true }
egui = "0.29"
reqwest = { version = "0.12", default-features = true, features = ["blocking", "socks", "gzip", "brotli", "deflate", "charset"] }
scraper = "0.20"
regex = "1.11"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
anyhow = "1.0"
url = "2.5"
serde_json = "1.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
